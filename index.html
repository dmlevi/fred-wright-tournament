<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fred Wright Jr. Tournament Manager</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #fbfaf6;
    --surface: #ffffff;
    --ink: #17150f;
    --ink-soft: #4a463e;
    --ink-muted: #847c6d;
    --border: #e3ddca;
    --border-soft: #eeead9;
    --forest: #1a5033;
    --forest-soft: #e4ede7;
    --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
    --sans: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
  }
  html, body { height: 100%; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    background-image: radial-gradient(rgba(23, 21, 15, 0.02) 1px, transparent 1px);
    background-size: 4px 4px;
  }
  main {
    max-width: 540px;
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 56px 44px;
    text-align: center;
    box-shadow: 0 1px 3px rgba(23, 21, 15, 0.04), 0 12px 32px rgba(23, 21, 15, 0.05);
  }
  .crest {
    width: 96px;
    height: 96px;
    margin: 0 auto 28px;
    display: block;
  }
  h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.018em;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .subtitle {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-muted);
    font-weight: 600;
    margin-bottom: 24px;
  }
  .divider {
    width: 36px;
    height: 2px;
    background: var(--forest);
    margin: 0 auto 22px;
    border-radius: 1px;
  }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 5px 14px;
    background: var(--forest-soft);
    color: var(--forest);
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 22px;
  }
  .pill::before {
    content: "";
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--forest);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  p {
    font-size: 14px;
    line-height: 1.6;
    color: var(--ink-soft);
    margin-bottom: 14px;
    max-width: 42ch;
    margin-left: auto;
    margin-right: auto;
  }
  p:last-of-type { margin-bottom: 0; }
  p strong { color: var(--ink); font-weight: 600; }
  .footer {
    margin-top: 36px;
    padding-top: 22px;
    border-top: 1px solid var(--border-soft);
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-muted);
    font-weight: 500;
  }
  .footer strong { color: var(--ink-soft); font-weight: 600; }
</style>
</head>
<body>

<main>
  <img class="crest" src="oakley-logo.png" alt="Oakley Country Club crest">
  <h1>Fred Wright Jr. Tournament Manager</h1>
  <div class="subtitle">Oakley Country Club &middot; 2026</div>
  <div class="divider"></div>

  <span class="pill">In development</span>

  <p>Putting the finishing touches on the prototype before review with the Golf Committee.</p>
  <p>This page will be live once we walk through it together <strong>in person</strong>.</p>

  <div class="footer">Stand by for the committee review</div>
</main>

</body>
</html>
