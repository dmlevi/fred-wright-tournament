<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fred Wright Tournament Manager</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f4f1ea;
    --panel: #ffffff;
    --ink: #1a1a1a;
    --ink-muted: #6b6b6b;
    --border: #d9d3c3;
    --green: #1e5631;
    --green-dark: #14421f;
    --green-light: #e8f0ea;
    --amber: #b8651a;
    --amber-bg: #fdf3e3;
    --red: #a33030;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  header {
    background: var(--green);
    color: white;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    border-bottom: 3px solid var(--green-dark);
    flex-wrap: wrap;
  }
  header h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  header .subtitle {
    font-size: 13px;
    opacity: 0.85;
    margin-left: -12px;
  }
  header .spacer { flex: 1; }
  .view-toggle {
    display: flex;
    background: rgba(255,255,255,0.1);
    border-radius: 6px;
    overflow: hidden;
  }
  .view-toggle button {
    background: transparent;
    color: white;
    border: 0;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    opacity: 0.7;
  }
  .view-toggle button.active {
    background: rgba(255,255,255,0.2);
    opacity: 1;
  }
  .season-label {
    font-size: 13px;
    opacity: 0.85;
  }
  .btn-reset {
    background: transparent;
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    padding: 6px 12px;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
  }
  .btn-reset:hover { background: rgba(255,255,255,0.1); }

  #banner-area { padding: 0 24px; }
  .banner {
    background: var(--amber-bg);
    border: 1px solid var(--amber);
    border-left: 4px solid var(--amber);
    padding: 12px 16px;
    margin-top: 16px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .banner .banner-icon { font-size: 18px; }
  .banner .banner-text { flex: 1; font-size: 14px; min-width: 200px; }
  .banner .banner-text strong { color: var(--amber); }
  .banner button {
    background: var(--amber);
    color: white;
    border: 0;
    padding: 6px 14px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
  }
  .banner button.secondary {
    background: transparent;
    color: var(--amber);
    border: 1px solid var(--amber);
  }

  main {
    padding: 24px;
  }

  .kanban {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    min-height: 500px;
  }
  @media (max-width: 1100px) {
    .kanban { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 600px) {
    .kanban { grid-template-columns: 1fr; }
  }
  .column {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    max-height: calc(100vh - 180px);
  }
  .column-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .column-title {
    font-weight: 600;
    font-size: 14px;
    color: var(--ink);
    flex: 1;
    cursor: text;
    padding: 2px 4px;
    border-radius: 3px;
    outline: none;
  }
  .column-title:hover { background: #f0ece2; }
  .column-title:focus { background: #fff8e1; box-shadow: 0 0 0 2px var(--amber); }
  .count-badge {
    background: var(--bg);
    color: var(--ink-muted);
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 500;
  }
  .btn-add {
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--ink-muted);
    width: 24px;
    height: 24px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .btn-add:hover { border-color: var(--green); color: var(--green); }
  .column-search-wrap {
    padding: 6px 8px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .column-search {
    width: 100%;
    padding: 5px 24px 5px 8px;
    font-size: 12px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: #faf8f3;
    color: var(--ink);
    font-family: inherit;
  }
  .column-search:focus {
    outline: none;
    border-color: var(--green);
    background: white;
    box-shadow: 0 0 0 2px rgba(30,86,49,0.1);
  }
  .column-search::placeholder { color: #aaa; }
  .column-search-clear {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    border: 0;
    background: transparent;
    color: var(--ink-muted);
    cursor: pointer;
    padding: 0;
    font-size: 16px;
    line-height: 1;
    display: none;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
  }
  .column-search-clear.visible { display: flex; }
  .column-search-clear:hover { color: var(--ink); background: rgba(0,0,0,0.06); }
  .search-empty {
    padding: 14px 8px;
    font-size: 12px;
    color: var(--ink-muted);
    text-align: center;
    font-style: italic;
  }
  .cards {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    min-height: 80px;
    transition: background 0.15s;
  }
  .cards.drop-target {
    background: var(--green-light);
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 10px 12px;
    margin-bottom: 6px;
    cursor: grab;
    font-size: 14px;
    transition: box-shadow 0.15s, border-color 0.15s, opacity 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
    user-select: none;
  }
  .card:hover {
    border-color: var(--green);
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  }
  .card.dragging { opacity: 0.35; cursor: grabbing; }
  .card-handle {
    flex-shrink: 0;
    width: 10px;
    height: 16px;
    cursor: grab;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.35;
    transition: opacity 0.15s;
  }
  .card:hover .card-handle { opacity: 0.9; }
  .card-handle svg { display: block; }
  .card-position {
    flex-shrink: 0;
    font-size: 12px;
    color: var(--ink-muted);
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    min-width: 22px;
    text-align: right;
    padding-right: 2px;
  }
  .card-name { flex: 1; }
  .badge {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .badge-deferred { background: #fde7d0; color: var(--amber); }
  .badge-new { background: #e6f0e8; color: var(--green); }
  .badge-returning { background: #e3f0fd; color: #2764b4; }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .overlay.hidden { display: none; }
  .modal {
    background: var(--panel);
    border-radius: 8px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    width: 480px;
    max-width: 100%;
    max-height: 90vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .modal-header {
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .modal-header h2 { font-size: 18px; font-weight: 600; flex: 1; }
  .modal-header .close {
    background: none;
    border: 0;
    font-size: 22px;
    color: var(--ink-muted);
    cursor: pointer;
    line-height: 1;
  }
  .modal-body { padding: 20px; overflow-y: auto; }
  .detail-row {
    display: flex;
    gap: 12px;
    padding: 6px 0;
    font-size: 14px;
  }
  .detail-row .label { color: var(--ink-muted); width: 120px; }
  .detail-row .value { flex: 1; font-weight: 500; }
  .history {
    margin-top: 18px;
    border-top: 1px solid var(--border);
    padding-top: 16px;
  }
  .history h3 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--ink-muted); margin-bottom: 8px; }
  .history-entry {
    display: flex;
    gap: 12px;
    padding: 6px 0;
    font-size: 13px;
    border-bottom: 1px dashed var(--border);
  }
  .history-entry:last-child { border-bottom: 0; }
  .history-entry .h-date { color: var(--ink-muted); width: 100px; flex-shrink: 0; font-variant-numeric: tabular-nums; }
  .history-entry .h-event { flex: 1; }
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px 16px;
    padding: 12px 14px;
    background: var(--green-light);
    border: 1px solid #c8dcc9;
    border-radius: 6px;
  }
  .stat-item { display: flex; flex-direction: column; gap: 2px; }
  .stat-label { font-size: 10px; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.4px; font-weight: 600; }
  .stat-value { font-size: 14px; font-weight: 600; color: var(--ink); }
  .notes-section { margin-top: 18px; border-top: 1px solid var(--border); padding-top: 16px; }
  .notes-section h3 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--ink-muted); margin-bottom: 10px; }
  .notes-textarea {
    width: 100%;
    min-height: 72px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 5px;
    font-family: inherit;
    font-size: 14px;
    line-height: 1.4;
    resize: vertical;
    background: #faf8f3;
    color: var(--ink);
  }
  .notes-textarea:focus { outline: none; border-color: var(--green); background: white; box-shadow: 0 0 0 3px rgba(30,86,49,0.08); }
  .notes-textarea::placeholder { color: #aaa; font-style: italic; }
  .notes-save-btn {
    margin-top: 8px;
    padding: 6px 12px;
    font-size: 12px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--ink);
    border-radius: 4px;
    cursor: pointer;
    font-weight: 500;
  }
  .notes-save-btn:not(:disabled):hover { border-color: var(--green); color: var(--green); }
  .notes-save-btn:disabled { opacity: 0.4; cursor: default; }
  .history-filters { display: flex; gap: 6px; margin: 0 0 12px; flex-wrap: wrap; }
  .filter-chip {
    padding: 3px 10px;
    font-size: 11px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--ink-muted);
    border-radius: 12px;
    cursor: pointer;
    font-weight: 500;
  }
  .filter-chip:hover { border-color: var(--green); color: var(--green); }
  .filter-chip.active { background: var(--green); color: white; border-color: var(--green); }
  .modal-footer {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    background: #faf8f3;
  }
  .modal-footer button {
    padding: 8px 14px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--ink);
  }
  .modal-footer button:hover { border-color: var(--green); }
  .modal-footer button.danger {
    color: var(--red);
    border-color: #eac7c7;
  }
  .modal-footer button.danger:hover { background: #fcf0f0; }

  .confirm {
    background: var(--panel);
    border-radius: 8px;
    width: 440px;
    max-width: 100%;
    padding: 22px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
  }
  .confirm h2 { font-size: 16px; margin-bottom: 10px; }
  .confirm p { font-size: 14px; color: var(--ink-muted); line-height: 1.5; margin-bottom: 18px; }
  .confirm-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .confirm-actions button {
    padding: 8px 14px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--panel);
  }
  .confirm-actions button.primary {
    background: var(--green);
    color: white;
    border-color: var(--green);
  }

  .player-view { max-width: 900px; margin: 0 auto; }
  .search-box {
    width: 100%;
    padding: 12px 16px;
    font-size: 15px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: white;
    margin-bottom: 20px;
  }
  .search-box:focus {
    outline: none;
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(30,86,49,0.1);
  }
  .public-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  @media (max-width: 700px) {
    .public-grid { grid-template-columns: 1fr; }
  }
  .public-column {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: var(--shadow);
  }
  .public-column h2 {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 15px;
    font-weight: 600;
    color: var(--green);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .public-column .public-count {
    font-size: 13px;
    color: var(--ink-muted);
    font-weight: 400;
  }
  .public-list {
    padding: 8px 0;
    max-height: calc(100vh - 280px);
    overflow-y: auto;
  }
  .public-list .player-row {
    padding: 6px 20px;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .public-list .player-letter {
    width: 16px;
    flex-shrink: 0;
    color: var(--green);
    font-weight: 700;
    font-size: 12px;
    text-align: center;
    text-transform: uppercase;
    opacity: 0.6;
  }
  .public-list .player-name { flex: 1; }
  .public-list .player-row.highlighted {
    background: #fff8e1;
    font-weight: 600;
  }
  .public-list .player-row.highlighted .player-letter { opacity: 1; }
  .empty-state {
    color: var(--ink-muted);
    font-size: 13px;
    padding: 20px;
    text-align: center;
    font-style: italic;
  }

  .rules-note {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 16px;
    margin-top: 16px;
    font-size: 13px;
    color: var(--ink-muted);
  }
  .rules-note strong { color: var(--ink); }
</style>
</head>
<body>

<header>
  <h1>Fred Wright Tournament Manager</h1>
  <span class="subtitle">Oakley Country Club</span>
  <div class="spacer"></div>
  <span class="season-label">Season: <strong>2026</strong></span>
  <div class="view-toggle">
    <button data-view="internal" class="active">Management View</button>
    <button data-view="public">Player View</button>
  </div>
  <button class="btn-reset" id="btn-reset">Reset Demo Data</button>
</header>

<div id="banner-area"></div>
<main id="main-view">Loading…</main>

<div class="overlay hidden" id="modal-overlay"></div>

<script>

          { date: '2021-11-01', event: 'Added to Participants for 2022 season', type: 'add' },
          { date: '2022-11-01', event: 'Added to Participants for 2023 season', type: 'add' },
          { date: '2023-11-01', event: 'Added to Participants for 2024 season', type: 'add' },
          { date: '2024-11-15', event: 'Participant in 2024 season', type: 'add' },
          { date: '2024-12-01', event: 'Deferred for 2025 season', type: 'defer', season: 2025 }
        ]
      },
      'Bartley, Jack': {
        notes: 'Work travel schedule variable. Confirm early for 2026.',
        history: [
          { date: '2022-11-01', event: 'Added to Participants for 2023 season', type: 'add' },
          { date: '2023-11-01', event: 'Added to Participants for 2024 season', type: 'add' },
          { date: '2024-11-15', event: 'Participant in 2024 season', type: 'add' },
          { date: '2024-12-01', event: 'Deferred for 2025 season', type: 'defer', season: 2025 }
        ]
      },
      'Judge, Greg': {
        notes: 'Priority for next open spot. Member since 2018. Confirmed 2026 interest via email 2/10.',
        history: [
          { date: '2022-11-15', event: 'Added to Waitlist for 2023 season', type: 'add' },
          { date: '2023-11-15', event: 'Carried on Waitlist for 2024 season', type: 'add' },
          { date: '2024-12-01', event: 'Added to Waitlist for 2025 season', type: 'add' }
        ]
      },
      "O'Neill, Conor": {
        notes: "Son of past member John O'Neill (founding member, 1998). Sponsored by Paul Glynn.",
        history: [
          { date: '2023-11-15', event: 'Added to Waitlist for 2024 season', type: 'add' },
          { date: '2024-12-01', event: 'Carried on Waitlist for 2025 season', type: 'add' }
        ]
      },
      'Micalizzi, Dave': {
        notes: 'Referred by Jim Conroy. Eager for first year.'
      }
    };
    players.forEach(p => {
      const extra = demoExtras[p.name];
      if (!extra) return;
      if (extra.notes !== undefined) p.notes = extra.notes;
      if (extra.history) p.history = extra.history;
    });

    return {
      lists: [
        { id: 'participants', name: 'Participants' },
        { id: 'deferred', name: 'Took Year Off' },
        { id: 'waitlist', name: 'Waitlist' },
        { id: 'new', name: 'New Players' }
      ],
      players: players,
      dismissedReturnBanner: false
    };
  }

  // ---------- STATE ----------
  let state = loadState();
  let currentView = 'internal';
  let searchQuery = '';
  const columnSearch = {};
  let dragging = null; // { playerId, cardEl }

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return seedData();
      const parsed = JSON.parse(raw);
      if (!parsed || !Array.isArray(parsed.players) || !Array.isArray(parsed.lists)) {
        return seedData();
      }
      return parsed;
    } catch (e) {
      return seedData();
    }
  }
  function saveState() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
  }
  function resetState() {
    if (!confirm('Reset all data to the 8/29/2025 seed? This will erase any changes.')) return;
    state = seedData();
    saveState();
    render();
  }

  // ---------- HELPERS ----------
  function today() { return new Date().toISOString().slice(0, 10); }
  function logHistory(player, event, type, extra) {
    if (!player.history) player.history = [];
    const entry = { date: today(), event: event, type: type || 'move' };
    if (extra) Object.assign(entry, extra);
    player.history.push(entry);
  }
  function findList(id) { return state.lists.find(l => l.id === id); }
  function playersInList(id) { return state.players.filter(p => p.list === id); }

  function deferredLastSeason(player) {
    return player.lastDeferredSeason === LAST_SEASON;
  }
  function getReturningPlayers() {
    return state.players.filter(p =>
      p.list === 'deferred' && p.deferralYear && p.deferralYear < CURRENT_SEASON
    );
  }

  // ---------- RENDER ----------
  const mainEl = document.getElementById('main-view');
  const bannerArea = document.getElementById('banner-area');
  const overlay = document.getElementById('modal-overlay');

  function render() {
    renderBanner();
    if (currentView === 'internal') renderInternal();
    else renderPublic();
  }

  function renderBanner() {
    bannerArea.innerHTML = '';
    if (state.dismissedReturnBanner) return;
    const returning = getReturningPlayers();
    if (returning.length === 0) return;
    const div = document.createElement('div');
    div.className = 'banner';
    const plural = returning.length === 1 ? '' : 's';
    const verb = returning.length === 1 ? 'is' : 'are';
    div.innerHTML =
      '<div class="banner-icon">&#x27F2;</div>' +
      '<div class="banner-text">' +
        '<strong>' + returning.length + ' player' + plural + '</strong> ' +
        'deferred for ' + LAST_SEASON + ' and ' + verb + ' ready to return for ' + CURRENT_SEASON + '.' +
      '</div>' +
      '<button id="banner-return-all">Return All to Participants</button>' +
      '<button class="secondary" id="banner-dismiss">Dismiss</button>';
    bannerArea.appendChild(div);
    document.getElementById('banner-return-all').onclick = () => {
      returning.forEach(p => {
        p.list = 'participants';
        p.deferralYear = null;
        logHistory(p, 'Returned from ' + LAST_SEASON + ' deferral — added to Participants', 'return');
      });
      saveState();
      render();
    };
    document.getElementById('banner-dismiss').onclick = () => {
      state.dismissedReturnBanner = true;
      saveState();
      render();
    };
  }

  function renderInternal() {
    mainEl.innerHTML = '<div class="kanban" id="kanban"></div>' +
      '<div class="rules-note"><strong>Active rules:</strong> Players in Participants auto-carry into next season. ' +
      'Deferring moves them to Took Year Off for one season. ' +
      'A second consecutive deferral triggers a warning and suggests moving them to the bottom of the Waitlist. ' +
      'Click any column name to rename it. Drag cards to move or reorder.</div>';

    const kanban = document.getElementById('kanban');
    state.lists.forEach(list => {
      const col = document.createElement('div');
      col.className = 'column';
      col.dataset.listId = list.id;

      const header = document.createElement('div');
      header.className = 'column-header';
      const titleEl = document.createElement('div');
      titleEl.className = 'column-title';
      titleEl.contentEditable = 'true';
      titleEl.textContent = list.name;
      titleEl.dataset.listId = list.id;
      const countEl = document.createElement('span');
      countEl.className = 'count-badge';
      const players = playersInList(list.id);
      countEl.textContent = players.length;
      const addBtn = document.createElement('button');
      addBtn.className = 'btn-add';
      addBtn.textContent = '+';
      addBtn.title = 'Add player';
      addBtn.onclick = () => addPlayerToList(list.id);
      header.appendChild(titleEl);
      header.appendChild(countEl);
      header.appendChild(addBtn);

      const searchWrap = document.createElement('div');
      searchWrap.className = 'column-search-wrap';
      const searchInput = document.createElement('input');
      searchInput.type = 'text';
      searchInput.className = 'column-search';
      searchInput.placeholder = 'Search…';
      searchInput.value = columnSearch[list.id] || '';
      searchInput.setAttribute('aria-label', 'Search ' + list.name);
      const clearBtn = document.createElement('button');
      clearBtn.type = 'button';
      clearBtn.className = 'column-search-clear';
      clearBtn.textContent = '×';
      clearBtn.title = 'Clear search';
      clearBtn.setAttribute('aria-label', 'Clear search');
      searchWrap.appendChild(searchInput);
      searchWrap.appendChild(clearBtn);

      const cardsEl = document.createElement('div');
      cardsEl.className = 'cards';
      cardsEl.dataset.listId = list.id;
      players.forEach((p, i) => cardsEl.appendChild(renderCard(p, i + 1)));
      attachDropHandlers(cardsEl);

      const applyColumnFilter = () => {
        const q = searchInput.value.toLowerCase().trim();
        const cards = cardsEl.querySelectorAll('.card');
        let visible = 0;
        cards.forEach(card => {
          const name = card.querySelector('.card-name').textContent.toLowerCase();
          const match = !q || name.includes(q);
          card.style.display = match ? '' : 'none';
          if (match) visible++;
        });
        countEl.textContent = q ? visible + ' / ' + players.length : players.length;
        const existingEmpty = cardsEl.querySelector('.search-empty');
        if (existingEmpty) existingEmpty.remove();
        if (q && visible === 0) {
          const msg = document.createElement('div');
          msg.className = 'search-empty';
          msg.textContent = 'No matches';
          cardsEl.appendChild(msg);
        }
        clearBtn.classList.toggle('visible', q.length > 0);
      };
      const setSearch = (val) => {
        searchInput.value = val;
        columnSearch[list.id] = val;
        applyColumnFilter();
      };
      searchInput.addEventListener('input', () => {
        columnSearch[list.id] = searchInput.value;
        applyColumnFilter();
      });
      searchInput.addEventListener('keydown', e => {
        if (e.key === 'Escape' && searchInput.value) setSearch('');
      });
      clearBtn.onclick = () => {
        setSearch('');
        searchInput.focus();
      };

      col.appendChild(header);
      col.appendChild(searchWrap);
      col.appendChild(cardsEl);
      kanban.appendChild(col);

      applyColumnFilter();

      titleEl.addEventListener('blur', () => {
        const newName = titleEl.textContent.trim();
        if (newName && newName !== list.name) {
          list.name = newName;
          saveState();
        } else {
          titleEl.textContent = list.name;
        }
      });
      titleEl.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); titleEl.blur(); }
      });
    });
  }

  function renderCard(p, position) {
    const div = document.createElement('div');
    div.className = 'card';
    div.draggable = true;
    div.dataset.playerId = p.id;

    const handleEl = document.createElement('span');
    handleEl.className = 'card-handle';
    handleEl.innerHTML =
      '<svg width="8" height="14" viewBox="0 0 8 14" fill="currentColor" aria-hidden="true">' +
        '<circle cx="2" cy="3" r="1"/><circle cx="6" cy="3" r="1"/>' +
        '<circle cx="2" cy="7" r="1"/><circle cx="6" cy="7" r="1"/>' +
        '<circle cx="2" cy="11" r="1"/><circle cx="6" cy="11" r="1"/>' +
      '</svg>';
    div.appendChild(handleEl);

    const posEl = document.createElement('span');
    posEl.className = 'card-position';
    posEl.textContent = position + '.';
    div.appendChild(posEl);

    const nameEl = document.createElement('span');
    nameEl.className = 'card-name';
    nameEl.textContent = p.name;
    div.appendChild(nameEl);

    if (p.list === 'deferred' && p.deferralYear) {
      const badge = document.createElement('span');
      badge.className = 'badge badge-deferred';
      badge.textContent = 'Deferred ' + p.deferralYear;
      div.appendChild(badge);
    } else if (p.list === 'new') {
      const badge = document.createElement('span');
      badge.className = 'badge badge-new';
      badge.textContent = 'New';
      div.appendChild(badge);
    } else if (p.list === 'participants' && p.lastDeferredSeason === LAST_SEASON) {
      const badge = document.createElement('span');
      badge.className = 'badge badge-returning';
      badge.textContent = 'Returning';
      div.appendChild(badge);
    }

    let dragStarted = false;
    div.addEventListener('dragstart', e => {
      dragStarted = true;
      dragging = { playerId: p.id, cardEl: div };
      div.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      try { e.dataTransfer.setData('text/plain', p.id); } catch (err) {}
    });
    div.addEventListener('dragend', () => {
      div.classList.remove('dragging');
      dragging = null;
      document.querySelectorAll('.cards.drop-target').forEach(el => el.classList.remove('drop-target'));
    });
    div.addEventListener('click', e => {
      if (dragStarted) { dragStarted = false; return; }
      showPlayerModal(p.id);
    });

    return div;
  }

  function attachDropHandlers(cardsEl) {
    cardsEl.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      cardsEl.classList.add('drop-target');
    });
    cardsEl.addEventListener('dragleave', e => {
      if (e.target === cardsEl) cardsEl.classList.remove('drop-target');
    });
    cardsEl.addEventListener('drop', e => {
      e.preventDefault();
      cardsEl.classList.remove('drop-target');
      if (!dragging) return;
      const player = state.players.find(p => p.id === dragging.playerId);
      if (!player) return;
      const toListId = cardsEl.dataset.listId;
      const fromListId = player.list;

      const afterEl = getDropTarget(cardsEl, e.clientY);
      const afterPlayerId = afterEl ? afterEl.dataset.playerId : null;

      if (fromListId !== toListId && toListId === 'deferred' && deferredLastSeason(player)) {
        showConfirmSecondDeferral(player, fromListId);
        return;
      }

      applyMove(player, toListId, afterPlayerId);
    });
  }

  function getDropTarget(container, y) {
    const cards = Array.from(container.querySelectorAll('.card')).filter(c => !c.classList.contains('dragging'));
    let closest = { offset: Number.NEGATIVE_INFINITY, card: null };
    for (let i = 0; i < cards.length; i++) {
      const card = cards[i];
      const box = card.getBoundingClientRect();
      const offset = y - box.top - box.height / 2;
      if (offset < 0 && offset > closest.offset) {
        closest = { offset: offset, card: card };
      }
    }
    return closest.card;
  }

  function applyMove(player, toListId, afterPlayerId) {
    const fromListId = player.list;
    const curIdx = state.players.findIndex(p => p.id === player.id);
    if (curIdx >= 0) state.players.splice(curIdx, 1);

    player.list = toListId;
    if (toListId === 'deferred') {
      player.deferralYear = CURRENT_SEASON;
      player.lastDeferredSeason = CURRENT_SEASON;
    } else if (fromListId === 'deferred') {
      player.deferralYear = null;
    }

    if (afterPlayerId) {
      const afterIdx = state.players.findIndex(p => p.id === afterPlayerId);
      if (afterIdx >= 0) state.players.splice(afterIdx, 0, player);
      else state.players.push(player);
    } else {
      state.players.push(player);
    }

    if (fromListId !== toListId) {
      let moveType = 'move';
      let extra;
      if (toListId === 'deferred') { moveType = 'defer'; extra = { season: CURRENT_SEASON }; }
      else if (fromListId === 'deferred') moveType = 'return';
      logHistory(player, 'Moved from ' + findList(fromListId).name + ' → ' + findList(toListId).name, moveType, extra);
    } else {
      logHistory(player, 'Reordered within ' + findList(toListId).name, 'reorder');
    }

    saveState();
    render();
  }

  // ---------- MODAL ----------
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });

  function closeModal() {
    overlay.classList.add('hidden');
    overlay.innerHTML = '';
  }

  function showPlayerModal(playerId) {
    const p = state.players.find(x => x.id === playerId);
    if (!p) return;
    const currentList = findList(p.list);
    const otherLists = state.lists.filter(l => l.id !== p.list);

    const initialHistory = p.history || [];
    const firstYear = initialHistory.length ? initialHistory[0].date.slice(0, 4) : '—';
    const deferSeasons = initialHistory
      .filter(h => h.type === 'defer' && h.season)
      .map(h => String(h.season));
    const deferSeasonsStr = deferSeasons.length ? deferSeasons.join(', ') : '—';

    const modal = document.createElement('div');
    modal.className = 'modal';

    modal.innerHTML =
      '<div class="modal-header">' +
        '<h2>' + escapeHtml(p.name) + '</h2>' +
        '<button class="close" id="m-close">&times;</button>' +
      '</div>' +
      '<div class="modal-body">' +
        '<div class="stats-grid">' +
          '<div class="stat-item"><span class="stat-label">Current list</span><span class="stat-value">' + escapeHtml(currentList.name) + '</span></div>' +
          '<div class="stat-item"><span class="stat-label">In system since</span><span class="stat-value">' + firstYear + '</span></div>' +
          '<div class="stat-item"><span class="stat-label">Times deferred</span><span class="stat-value">' + deferSeasons.length + '</span></div>' +
          '<div class="stat-item"><span class="stat-label">Deferred seasons</span><span class="stat-value">' + deferSeasonsStr + '</span></div>' +
        '</div>' +
        '<div class="notes-section">' +
          '<h3>Notes</h3>' +
          '<textarea class="notes-textarea" id="notes-textarea" placeholder="Back trouble — morning tee times only. Usually pairs with Mike Burke. Emailed 3/15, no reply yet."></textarea>' +
          '<button class="notes-save-btn" id="notes-save" disabled>Save notes</button>' +
        '</div>' +
        '<div class="history">' +
          '<h3>History</h3>' +
          '<div class="history-filters">' +
            '<button class="filter-chip active" data-filter="all">All</button>' +
            '<button class="filter-chip" data-filter="moves">Moves</button>' +
            '<button class="filter-chip" data-filter="deferrals">Deferrals</button>' +
            '<button class="filter-chip" data-filter="notes">Notes</button>' +
          '</div>' +
          '<div id="history-list"></div>' +
        '</div>' +
      '</div>' +
      '<div class="modal-footer">' +
        otherLists.map(l => '<button data-move="' + l.id + '">Move to ' + escapeHtml(l.name) + '</button>').join('') +
        '<div style="flex:1"></div>' +
        '<button class="danger" id="m-delete">Delete</button>' +
      '</div>';

    overlay.innerHTML = '';
    overlay.appendChild(modal);
    overlay.classList.remove('hidden');

    const categoryForType = {
      move: 'moves', reorder: 'moves', add: 'moves',
      defer: 'deferrals', return: 'deferrals',
      note: 'notes'
    };
    const chips = modal.querySelectorAll('.filter-chip');
    const historyContainer = modal.querySelector('#history-list');
    let activeFilter = 'all';
    const renderHistoryList = (filter) => {
      const hist = p.history || [];
      const filtered = filter === 'all'
        ? hist
        : hist.filter(h => categoryForType[h.type || 'move'] === filter);
      const reversed = filtered.slice().reverse();
      historyContainer.innerHTML = reversed.length === 0
        ? '<div class="empty-state">No entries in this category.</div>'
        : reversed.map(h =>
            '<div class="history-entry">' +
              '<span class="h-date">' + escapeHtml(h.date) + '</span>' +
              '<span class="h-event">' + escapeHtml(h.event) + '</span>' +
            '</div>').join('');
    };
    chips.forEach(chip => {
      chip.onclick = () => {
        chips.forEach(c => c.classList.toggle('active', c === chip));
        activeFilter = chip.dataset.filter;
        renderHistoryList(activeFilter);
      };
    });
    renderHistoryList(activeFilter);

    const notesArea = modal.querySelector('#notes-textarea');
    const notesBtn = modal.querySelector('#notes-save');
    let initialNotes = p.notes || '';
    notesArea.value = initialNotes;
    notesArea.addEventListener('input', () => {
      notesBtn.disabled = notesArea.value === initialNotes;
    });
    notesBtn.onclick = () => {
      const newValue = notesArea.value;
      if (newValue === initialNotes) return;
      p.notes = newValue;
      logHistory(p, newValue.trim() ? 'Notes updated' : 'Notes cleared', 'note');
      saveState();
      initialNotes = newValue;
      notesBtn.disabled = true;
      renderHistoryList(activeFilter);
    };

    modal.querySelector('#m-close').onclick = closeModal;
    modal.querySelector('#m-delete').onclick = () => {
      if (!confirm('Delete ' + p.name + ' from the tournament entirely?')) return;
      state.players = state.players.filter(x => x.id !== p.id);
      saveState();
      closeModal();
      render();
    };
    modal.querySelectorAll('[data-move]').forEach(btn => {
      btn.onclick = () => {
        const toListId = btn.dataset.move;
        if (toListId === 'deferred' && deferredLastSeason(p)) {
          closeModal();
          showConfirmSecondDeferral(p, p.list);
          return;
        }
        applyMove(p, toListId, null);
        closeModal();
      };
    });
  }

  function showConfirmSecondDeferral(player, fromListId) {
    const c = document.createElement('div');
    c.className = 'confirm';
    c.innerHTML =
      '<h2>Second Consecutive Deferral</h2>' +
      '<p><strong>' + escapeHtml(player.name) + '</strong> already deferred for the ' + LAST_SEASON + ' season. ' +
      'Per tournament rules, a second consecutive deferral sends them to the bottom of the Waitlist.</p>' +
      '<div class="confirm-actions">' +
        '<button id="c-cancel">Cancel</button>' +
        '<button id="c-waitlist" class="primary">Move to Waitlist (bottom)</button>' +
      '</div>';
    overlay.innerHTML = '';
    overlay.appendChild(c);
    overlay.classList.remove('hidden');

    c.querySelector('#c-cancel').onclick = () => {
      closeModal();
      render();
    };
    c.querySelector('#c-waitlist').onclick = () => {
      applyMove(player, 'waitlist', null);
      closeModal();
    };
  }

  function addPlayerToList(listId) {
    const name = prompt('Player name (format: Last, First)');
    if (!name || !name.trim()) return;
    const newPlayer = {
      id: 'p' + Date.now(),
      name: name.trim(),
      list: listId,
      deferralYear: listId === 'deferred' ? CURRENT_SEASON : null,
      notes: '',
      history: [{ date: today(), event: 'Added to ' + findList(listId).name, type: 'add' }]
    };
    if (listId === 'deferred') newPlayer.lastDeferredSeason = CURRENT_SEASON;
    state.players.push(newPlayer);
    saveState();
    render();
  }

  // ---------- PUBLIC VIEW ----------
  function renderPublic() {
    const inList = state.players
      .filter(p => p.list === 'participants')
      .map(p => p.name)
      .sort((a, b) => a.localeCompare(b));
    const waitingList = state.players
      .filter(p => p.list !== 'participants')
      .map(p => p.name)
      .sort((a, b) => a.localeCompare(b));

    const renderRows = (list) => {
      if (list.length === 0) return '<div class="empty-state">No one here.</div>';
      let prevLetter = '';
      return list.map(n => {
        const letter = n.charAt(0).toUpperCase();
        const showLetter = letter !== prevLetter;
        prevLetter = letter;
        return '<div class="player-row' + (highlight(n) ? ' highlighted' : '') + '">' +
          '<span class="player-letter">' + (showLetter ? letter : '') + '</span>' +
          '<span class="player-name">' + escapeHtml(n) + '</span>' +
          '</div>';
      }).join('');
    };

    const renderColumn = (title, names) =>
      '<div class="public-column">' +
        '<h2>' + title + ' <span class="public-count">' + names.length + ' players &middot; alphabetical</span></h2>' +
        '<div class="public-list">' + renderRows(names) + '</div>' +
      '</div>';

    mainEl.innerHTML =
      '<div class="player-view">' +
        '<input type="text" class="search-box" id="search" placeholder="Search for your name..." value="' + escapeHtml(searchQuery) + '" />' +
        '<div class="public-grid">' +
          renderColumn('In the Tournament', inList) +
          renderColumn('Waiting', waitingList) +
        '</div>' +
        '<div class="rules-note">Names are listed <strong>alphabetically by last name</strong>. ' +
        'Placement in the Waiting list does <strong>not</strong> reflect position in the queue or priority for entry.</div>' +
      '</div>';

    const searchEl = document.getElementById('search');
    searchEl.addEventListener('input', e => {
      searchQuery = e.target.value;
      const cursor = searchEl.selectionStart;
      renderPublic();
      const newSearch = document.getElementById('search');
      newSearch.focus();
      newSearch.setSelectionRange(cursor, cursor);
    });
  }
  function highlight(name) {
    if (!searchQuery.trim()) return false;
    return name.toLowerCase().indexOf(searchQuery.toLowerCase().trim()) !== -1;
  }

  // ---------- UTILS ----------
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  // ---------- WIRE UP ----------
  document.querySelectorAll('.view-toggle button').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentView = btn.dataset.view;
      render();
    };
  });
  document.getElementById('btn-reset').onclick = resetState;
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && !overlay.classList.contains('hidden')) closeModal();
  });

  render();
})();
</script>
</body>
</html>
